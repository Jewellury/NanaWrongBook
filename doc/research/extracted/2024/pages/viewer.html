<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>2024 Exam Pages</title>
<style>body{margin:20px;background:#333;}img{display:block;max-width:100%;margin:20px auto;border:2px solid #666;}h1{color:white;text-align:center;}</style></head>
<body>
<h1>2024 新高考全国I卷 数学真题（解析版） - 24 Pages</h1>
<div id="pages"></div>
<script>
for(let i=1;i<=24;i++){
  const n=String(i).padStart(2,'0');
  const img=document.createElement('img');
  img.src=`page-${n}.jpg`;
  img.alt=`Page ${i}`;
  document.getElementById('pages').appendChild(img);
}
</script>
</body></html>
